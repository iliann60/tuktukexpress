<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TukTuk Express | Street Food Vietnamien</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        *{ margin: 0; padding: 0; box-sizing: border-box; }
        body{ font-family: 'Poppins', sans-serif; background-color: #f4f4f4; color: #333; overflow-x: hidden; }
        .container{ max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- HEADER --- */
        .mainheader{ position: fixed; top: 0; left: 0; width: 100%; height: 110px; z-index: 1000; background: #0a1f38; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; }
        .nav{ display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .logo{ height: 90px; width: auto; display: block; transition: transform 0.3s ease; }
        .logo:hover{ transform: scale(1.05); }

        .navlist{ display: flex; list-style: none; }
        .navlist li{ margin: 0 20px; }
        .navlist a{ text-decoration: none; color: white; font-weight: 500; font-size: 1rem; letter-spacing: 0.5px; transition: color 0.3s; position: relative; text-transform: uppercase; }
        .navlist a::after{ content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #e67e22; transition: width 0.3s; }
        .navlist a:hover::after, .navlist a.active::after{ width: 100%; }

        .socials a{ color: white; font-size: 1.3rem; margin-left: 18px; transition: transform 0.3s, color 0.3s; display: inline-block; }
        .socials a:hover{ color: #e67e22; transform: translateY(-3px); }

        /* --- BURGER --- */
        .burgermenu{ display: none; cursor: pointer; padding: 10px; z-index: 1100; }
        .bar{ display: block; width: 28px; height: 3px; margin: 5px auto; transition: all 0.3s ease-in-out; background-color: white; border-radius: 2px; }

        /* --- HERO --- */
        .hero{ position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
        .heroimg{ position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .herooverlay{ position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(10, 31, 56, 0.85) 0%, rgba(0, 0, 0, 0.5) 100%); z-index: -1; }
        .herotext h1{ font-size: 4.5rem; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; line-height: 1; }
        .subtitle{ display: block; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; color: #e67e22; }
        .highlight{ color: #e67e22; }
        .herotext p{ font-size: 1.2rem; margin-bottom: 40px; max-width: 700px; margin-left: auto; margin-right: auto; opacity: 0.9; }
        .herobuttons{ display: flex; justify-content: center; gap: 20px; }
        .btn{ padding: 16px 40px; border-radius: 4px; text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; transition: all 0.3s ease; }
        .btn.primary{ background: #e67e22; color: white; border: 2px solid #e67e22; }
        .btn.primary:hover{ background: transparent; color: #e67e22; transform: translateY(-2px); }
        .btn.secondary{ background: transparent; color: white; border: 2px solid white; }
        .btn.secondary:hover{ background: white; color: #0a1f38; transform: translateY(-2px); }

        /* --- FOOTER --- */
        footer{ background: #0a1f38; color: white; padding: 60px 0 30px; text-align: center; }
        .footercontent{ border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 30px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .footersocials a{ color: white; font-size: 1.5rem; margin: 0 10px; transition: color 0.3s; }
        .footersocials a:hover{ color: #e67e22; }
        .copyright{ font-size: 0.85rem; opacity: 0.6; }

        /* --- ANIMATIONS --- */
        .reveal{ opacity: 0; transform: translateY(40px); transition: all 1.2s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.active{ opacity: 1; transform: translateY(0); }

        /* --- MOBILE --- */
        @media (max-width: 992px) {
            .mainheader{ height: 80px; }
            .logo{ height: 60px; }
            .socials{ display: none; }
            .burgermenu{ display: block; }

            .navlist{
                position: fixed;
                left: -100%;
                top: 80px;
                flex-direction: column;
                background-color: #0a1f38;
                width: 100%;
                height: calc(100vh - 80px);
                text-align: center;
                transition: 0.4s ease;
                padding-top: 40px;
                box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            }

            .navlist.active{ left: 0; }
            .navlist li{ margin: 25px 0; }
            .navlist a{ font-size: 1.2rem; }

            .burgermenu.active .bar:nth-child(2){ opacity: 0; }
            .burgermenu.active .bar:nth-child(1){ transform: translateY(8px) rotate(45deg); }
            .burgermenu.active .bar:nth-child(3){ transform: translateY(-8px) rotate(-45deg); }

            .herotext h1{ font-size: 2.5rem; }
            .herobuttons{ flex-direction: column; align-items: center; gap: 15px; }
            .hero{ height: auto; padding: 150px 0; }
        }
    </style>
</head>
<body>
    <header class="mainheader">
        <div class="nav container">
            <div class="logowrapper">
                <a href="index.html"><img src="images/logo.jpg" class="logo" alt="TukTuk Express"></a>
            </div>
            
            <nav>
                <ul class="navlist" id="navmenu">
                    <li><a href="index.html" class="active">Accueil</a></li>
                    <li><a href="plats.html">Nos Plats</a></li>
                    <li><a href="histoire.html">Notre Histoire</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

            <div class="burgermenu" id="burger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <div class="socials">
                <a href="https://www.instagram.com/tuk.tuk.express/"><i class="fab fa-instagram"></i></a>
                <a href="https://www.facebook.com/people/TukTuk-Express/100068199113704/"><i class="fab fa-facebook"></i></a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="herooverlay"></div>
        <img src="images/bande.jpg" class="heroimg" alt="Ambiance Vietnam">
        <div class="herotext">
            <span class="subtitle reveal">L'authenticité à chaque bouchée</span>
            <h1 class="reveal">Street Food <span class="highlight">Vietnamien</span></h1>
            <p class="reveal">Une explosion de saveurs traditionnelles cuisinées avec passion dans notre Food Truck.</p>
            <div class="herobuttons reveal">
                <a href="plats.html" class="btn primary">Découvrir le menu</a>
                <a href="contact.html" class="btn secondary">Nous trouver</a>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footercontent">
                <p>TukTuk Express — Street Food Vietnamien</p>
                <div class="footersocials">
                    <a href="https://www.instagram.com/tuk.tuk.express/"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.facebook.com/people/TukTuk-Express/100068199113704/"><i class="fab fa-facebook"></i></a>
                </div>
            </div>
            <p class="copyright">© 2026 | TukTuk Express</p>
        </div>
    </footer>

    <script>
        burger= document.getElementById("burger");
        navmenu= document.getElementById("navmenu");

        burger.addEventListener("click", () => {
            burger.classList.toggle("active");
            navmenu.classList.toggle("active");
        });

        document.querySelectorAll(".navlist a").forEach(n => n.addEventListener("click", () => {
            burger.classList.remove("active");
            navmenu.classList.remove("active");
        }));

        function revealOnScroll() {
            reveals= document.querySelectorAll(".reveal");
            windowHeight= window.innerHeight;
            revealPoint= 100;
            reveals.forEach(el => {
                revealTop= el.getBoundingClientRect().top;
                if (revealTop < windowHeight - revealPoint) {
                    el.classList.add("active");
                }
            });
        }
        window.addEventListener("scroll", revealOnScroll);
        window.onload= function() { revealOnScroll(); }
    </script>
</body>
</html>
